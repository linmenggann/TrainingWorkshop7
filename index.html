<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>教學訓練計畫主持人工作坊 報名表</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 自定義漂浮動畫 */
        @keyframes float {
            0% { transform: translateY(0) rotate(0deg) scale(1); opacity: 0; }
            20% { opacity: 0.8; }
            80% { opacity: 0.8; }
            100% { transform: translateY(-100vh) rotate(360deg) scale(1.5); opacity: 0; }
        }
        
        .floating-emoji {
            position: fixed;
            bottom: -50px;
            font-size: 2rem;
            pointer-events: none;
            animation: float 15s infinite linear;
            z-index: 0;
        }

        .delay-1 { animation-delay: 2s; left: 10%; }
        .delay-2 { animation-delay: 5s; left: 30%; font-size: 3rem; }
        .delay-3 { animation-delay: 1s; left: 50%; }
        .delay-4 { animation-delay: 7s; left: 70%; font-size: 2.5rem; }
        .delay-5 { animation-delay: 4s; left: 90%; }
        
        /* 玻璃擬態樣式 */
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        /* 隱藏捲軸但保留功能 */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1; 
        }
        ::-webkit-scrollbar-thumb {
            background: #a855f7; 
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #9333ea; 
        }

        /* 新增背景圖片樣式 */
        .bg-custom-image {
            /* 加入半透明漸層覆蓋層，確保玻璃卡片清晰可見 */
            background-image: 
                linear-gradient(rgba(30, 27, 75, 0.8), rgba(134, 25, 143, 0.7)), 
                url('https://raw.githubusercontent.com/linmenggann/TrainingWorkshop7/main/%E5%90%B3%E5%9C%92__A1_A%E7%89%88.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }
    </style>
</head>
<body class="min-h-screen bg-custom-image font-sans text-gray-800 relative overflow-x-hidden selection:bg-purple-300 selection:text-purple-900">

    <!-- 背景漂浮 Emojis -->
    <div class="floating-emoji delay-1">✨</div>
    <div class="floating-emoji delay-2">🎓</div>
    <div class="floating-emoji delay-3">💡</div>
    <div class="floating-emoji delay-4">🚀</div>
    <div class="floating-emoji delay-5">🎉</div>

    <div class="container mx-auto px-4 py-12 relative z-10 flex justify-center min-h-screen items-center">
        <!-- 主要表單卡片 -->
        <div class="glass-card w-full max-w-3xl rounded-3xl shadow-2xl overflow-hidden transform transition-all hover:shadow-purple-500/50 duration-500">
            
            <!-- 頂部 Header -->
            <div class="bg-gradient-to-r from-purple-600 to-pink-500 p-8 text-center text-white relative overflow-hidden">
                <div class="absolute top-0 left-0 w-full h-full bg-black opacity-10"></div>
                <h1 class="text-3xl md:text-4xl font-extrabold relative z-10 mb-2 tracking-wide drop-shadow-md">
                    🌟 教學訓練計畫主持人工作坊 🌟
                </h1>
                <p class="text-purple-100 relative z-10 text-lg">誠摯邀請您共襄盛舉，一起探索教學的無限可能！🚀</p>
            </div>

            <div class="p-6 md:p-10">
                <!-- 活動資訊區塊 -->
                <div class="bg-purple-50 rounded-2xl p-6 mb-8 border-l-4 border-purple-500 shadow-sm">
                    <h2 class="text-xl font-bold text-purple-800 mb-4 flex items-center">
                        <span class="text-2xl mr-2">📌</span> 活動資訊
                    </h2>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 text-gray-700">
                        <div class="flex items-center space-x-3 bg-white p-3 rounded-lg shadow-sm">
                            <span class="text-2xl">📅</span>
                            <div>
                                <p class="text-sm text-gray-500">日期</p>
                                <p class="font-semibold">2026/01/25</p>
                            </div>
                        </div>
                        <div class="flex items-center space-x-3 bg-white p-3 rounded-lg shadow-sm">
                            <span class="text-2xl">⏰</span>
                            <div>
                                <p class="text-sm text-gray-500">時間</p>
                                <p class="font-semibold">9:00 ~ 16:00</p>
                            </div>
                        </div>
                        <div class="flex items-center space-x-3 bg-white p-3 rounded-lg shadow-sm md:col-span-2">
                            <span class="text-2xl">🏥</span>
                            <div>
                                <p class="text-sm text-gray-500">地點</p>
                                <p class="font-semibold">奇美醫院 第五醫療大樓 6樓 563會議室</p>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 報名表單 -->
                <form id="registrationForm" class="space-y-6" onsubmit="handleFormSubmit(event)">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        
                        <!-- 姓名 -->
                        <div>
                            <label class="block text-gray-700 font-bold mb-2" for="name">
                                👤 姓名 <span class="text-red-500">*</span>
                            </label>
                            <input type="text" id="name" required
                                class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-purple-500 focus:border-purple-500 outline-none transition-all shadow-sm placeholder-gray-400"
                                placeholder="請輸入您的真實姓名">
                        </div>

                        <!-- 職稱 -->
                        <div>
                            <label class="block text-gray-700 font-bold mb-2" for="title">
                                💼 職稱 <span class="text-red-500">*</span>
                            </label>
                            <input type="text" id="title" required
                                class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-purple-500 focus:border-purple-500 outline-none transition-all shadow-sm placeholder-gray-400"
                                placeholder="例如：主治醫師、護理長">
                        </div>

                        <!-- 機構名 -->
                        <div class="md:col-span-2">
                            <label class="block text-gray-700 font-bold mb-2" for="institution">
                                🏢 機構名 <span class="text-red-500">*</span>
                            </label>
                            <input type="text" id="institution" required
                                class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-purple-500 focus:border-purple-500 outline-none transition-all shadow-sm placeholder-gray-400"
                                placeholder="請輸入您所屬的醫療機構名稱">
                        </div>

                        <!-- 負責的職類 -->
                        <div class="md:col-span-2">
                            <label class="block text-gray-700 font-bold mb-2" for="profession">
                                🎯 負責的職類 <span class="text-red-500">*</span>
                            </label>
                            <div class="relative">
                                <select id="profession" required
                                    class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-purple-500 focus:border-purple-500 outline-none transition-all shadow-sm appearance-none bg-white">
                                    <option value="" disabled selected>👉 請選擇您負責的職類...</option>
                                    <option value="藥事">💊 藥事</option>
                                    <option value="醫事放射">☢️ 醫事放射</option>
                                    <option value="醫事檢驗">🔬 醫事檢驗</option>
                                    <option value="護理">🩺 護理</option>
                                    <option value="營養">🥗 營養</option>
                                    <option value="呼吸治療">🫁 呼吸治療</option>
                                    <option value="聽力">👂 聽力</option>
                                    <option value="物理治療">🏃‍♂️ 物理治療</option>
                                    <option value="職能治療">👐 職能治療</option>
                                    <option value="臨床心理">🧠 臨床心理</option>
                                    <option value="語言治療">🗣️ 語言治療</option>
                                    <option value="其他">✨ 其他</option>
                                </select>
                                <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-gray-500">
                                    <svg class="fill-current h-4 w-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20"><path d="M9.293 12.95l.707.707L15.657 8l-1.414-1.414L10 10.828 5.757 6.586 4.343 8z"/></svg>
                                </div>
                            </div>
                        </div>

                        <!-- 擔任教學訓練計畫主持人 -->
                        <div>
                            <label class="block text-gray-700 font-bold mb-3">
                                👑 目前是否擔任教學訓練計畫主持人？ <span class="text-red-500">*</span>
                            </label>
                            <div class="flex space-x-6">
                                <label class="flex items-center space-x-2 cursor-pointer group">
                                    <input type="radio" name="isDirector" value="是" required class="w-5 h-5 text-purple-600 focus:ring-purple-500 border-gray-300 cursor-pointer">
                                    <span class="group-hover:text-purple-600 transition-colors">✅ 是</span>
                                </label>
                                <label class="flex items-center space-x-2 cursor-pointer group">
                                    <input type="radio" name="isDirector" value="否" required class="w-5 h-5 text-purple-600 focus:ring-purple-500 border-gray-300 cursor-pointer">
                                    <span class="group-hover:text-purple-600 transition-colors">❌ 否</span>
                                </label>
                            </div>
                        </div>

                        <!-- 參與方式 -->
                        <div>
                            <label class="block text-gray-700 font-bold mb-3">
                                💻 您預計以何種方式參與？ <span class="text-red-500">*</span>
                            </label>
                            <div class="flex space-x-6">
                                <label class="flex items-center space-x-2 cursor-pointer group">
                                    <input type="radio" name="attendType" value="實體" required class="w-5 h-5 text-purple-600 focus:ring-purple-500 border-gray-300 cursor-pointer">
                                    <span class="group-hover:text-purple-600 transition-colors">🏢 實體</span>
                                </label>
                                <label class="flex items-center space-x-2 cursor-pointer group">
                                    <input type="radio" name="attendType" value="線上" required class="w-5 h-5 text-purple-600 focus:ring-purple-500 border-gray-300 cursor-pointer">
                                    <span class="group-hover:text-purple-600 transition-colors">🌐 線上</span>
                                </label>
                            </div>
                        </div>

                        <!-- Email -->
                        <div>
                            <label class="block text-gray-700 font-bold mb-2" for="email">
                                ✉️ Email <span class="text-red-500">*</span>
                            </label>
                            <input type="email" id="email" required
                                class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-purple-500 focus:border-purple-500 outline-none transition-all shadow-sm placeholder-gray-400"
                                placeholder="example@email.com">
                        </div>

                        <!-- 聯繫電話 -->
                        <div>
                            <label class="block text-gray-700 font-bold mb-2" for="phone">
                                📱 聯繫電話 <span class="text-red-500">*</span>
                            </label>
                            <input type="tel" id="phone" required
                                class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-purple-500 focus:border-purple-500 outline-none transition-all shadow-sm placeholder-gray-400"
                                placeholder="手機或市話均可">
                        </div>
                    </div>

                    <!-- 提交按鈕 -->
                    <div class="pt-6 text-center">
                        <button type="submit" 
                            class="w-full md:w-auto px-10 py-4 bg-gradient-to-r from-purple-600 to-pink-500 text-white font-bold text-lg rounded-full shadow-lg shadow-purple-500/30 transform transition-all duration-300 hover:scale-105 hover:shadow-purple-500/50 hover:from-purple-500 hover:to-pink-400 focus:outline-none focus:ring-4 focus:ring-purple-300 flex items-center justify-center mx-auto space-x-2">
                            <span>🚀 立即報名</span>
                        </button>
                    </div>
                </form>

                <!-- 聯絡資訊 Footer -->
                <div class="mt-10 pt-6 border-t border-gray-200 text-sm text-gray-500 text-center">
                    <p class="mb-2">🏆 <strong>主辦單位：</strong> 奇美醫院教學部</p>
                    <p class="mb-2">🙋‍♂️ <strong>聯絡人：</strong> 陳大頭</p>
                    <p>📞 <strong>聯繫電話：</strong> 06-281-2811 分機 57112233</p>
                </div>

            </div>
        </div>
    </div>

    <!-- 報名成功自訂 Modal (代替 Alert) -->
    <div id="successModal" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl p-8 max-w-sm w-full text-center shadow-2xl transform scale-95 opacity-0 transition-all duration-300" id="modalContent">
            <div class="text-6xl mb-4 animate-bounce">🎉</div>
            <h3 class="text-2xl font-bold text-purple-700 mb-2">報名成功！</h3>
            <p class="text-gray-600 mb-6">感謝您的填寫，我們期待在工作坊與您相見！✨</p>
            <button onclick="closeModal()" class="w-full py-3 bg-purple-600 text-white rounded-xl font-bold hover:bg-purple-700 transition-colors shadow-md">
                太棒了！👍
            </button>
        </div>
    </div>

    <script>
        // 您的專屬 Google Apps Script API 網址
        const scriptURL = 'https://script.google.com/macros/s/AKfycbz5ASMHu89qJXNPHejY26CUEB54pwD1729KLEFih0_KNsV4yTZvzIHvp3wjoriyMAsf/exec';
        const MAX_CAPACITY = 4;

        // 頁面載入時自動檢查是否額滿
        window.addEventListener('DOMContentLoaded', async () => {
            const submitBtn = document.querySelector('button[type="submit"]');
            const originalText = submitBtn.innerHTML;
            
            // 暫時鎖定按鈕，顯示檢查中
            submitBtn.innerHTML = '<span>⏳ 檢查名額中...</span>';
            submitBtn.disabled = true;

            try {
                // 利用原本做給儀表板的 GET API 取得目前報名資料
                const response = await fetch(scriptURL);
                const result = await response.json();

                if (result.status === 'success') {
                    if (result.data.length >= MAX_CAPACITY) {
                        // 已經額滿：改變按鈕樣式、顯示額滿文字，並禁用所有輸入框
                        submitBtn.innerHTML = '<span>🚫 本活動已額滿</span>';
                        submitBtn.classList.remove('from-purple-600', 'to-pink-500', 'hover:scale-105', 'hover:shadow-purple-500/50');
                        submitBtn.classList.add('bg-gray-400', 'cursor-not-allowed');
                        submitBtn.style.background = '#9ca3af'; // 強制覆蓋漸層為灰色
                        
                        const formElements = document.getElementById('registrationForm').elements;
                        for (let i = 0; i < formElements.length; i++) {
                            formElements[i].disabled = true;
                        }
                    } else {
                        // 尚有名額：恢復按鈕狀態，開放報名
                        submitBtn.innerHTML = originalText;
                        submitBtn.disabled = false;
                    }
                }
            } catch (error) {
                console.error('名額檢查失敗:', error);
                // 若連線異常無法檢查，先開放填寫，由後端的防線來阻擋
                submitBtn.innerHTML = originalText;
                submitBtn.disabled = false;
            }
        });

        async function handleFormSubmit(event) {
            // 阻止表單默認提交行為
            event.preventDefault();
            
            // 取得提交按鈕並更改狀態為傳送中
            const submitBtn = event.target.querySelector('button[type="submit"]');
            const originalBtnText = submitBtn.innerHTML;
            submitBtn.innerHTML = '<span>⏳ 傳送中...</span>';
            submitBtn.disabled = true;

            // 收集表單資料
            const formData = {
                name: document.getElementById('name').value,
                title: document.getElementById('title').value,
                institution: document.getElementById('institution').value,
                profession: document.getElementById('profession').value,
                isDirector: document.querySelector('input[name="isDirector"]:checked').value,
                attendType: document.querySelector('input[name="attendType"]:checked').value,
                email: document.getElementById('email').value,
                phone: document.getElementById('phone').value
            };

            try {
                // 將資料轉換為 URLSearchParams 格式 (最相容 Google Apps Script)
                const formBody = new URLSearchParams(formData);

                // 傳送請求至 Google Sheets
                await fetch(scriptURL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: formBody
                });
                
                // 因為使用 no-cors 模式，瀏覽器會隱藏回傳結果 (Opaque response)。
                // 只要網路請求本身沒有報錯 (沒有拋出例外)，我們就視為資料已成功送出並顯示成功 Modal。
                const modal = document.getElementById('successModal');
                const modalContent = document.getElementById('modalContent');
                
                modal.classList.remove('hidden');
                setTimeout(() => {
                    modalContent.classList.remove('scale-95', 'opacity-0');
                    modalContent.classList.add('scale-100', 'opacity-100');
                }, 10);
                
            } catch (error) {
                console.error('Error!', error.message);
                alert('報名送出失敗，請稍後再試！\n（或檢查網路連線狀態）\n錯誤訊息：' + error.message);
            } finally {
                // 恢復按鈕狀態
                submitBtn.innerHTML = originalBtnText;
                submitBtn.disabled = false;
            }
        }

        function closeModal() {
            const modal = document.getElementById('successModal');
            const modalContent = document.getElementById('modalContent');
            const form = document.getElementById('registrationForm');
            
            // 隱藏動畫
            modalContent.classList.remove('scale-100', 'opacity-100');
            modalContent.classList.add('scale-95', 'opacity-0');
            
            setTimeout(() => {
                modal.classList.add('hidden');
                form.reset(); // 清空表單
            }, 300);
        }
    </script>
</body>
</html>
