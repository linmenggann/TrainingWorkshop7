<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>教學訓練計畫主持人工作坊｜報名現況儀表板</title>
  <style>
    :root {
      --ink: #fff8ff;
      --muted: #e9d5ff;
      --panel: rgba(255, 255, 255, 0.13);
      --line: rgba(255, 255, 255, 0.25);
      --cyan: #22d3ee;
      --lime: #bef264;
      --pink: #fb7185;
      --violet: #8b5cf6;
      --shadow: 0 22px 70px rgba(27, 8, 62, 0.45);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      font-family: "Microsoft JhengHei", "PingFang TC", "Noto Sans TC", system-ui, sans-serif;
      background:
        radial-gradient(circle at 14% 14%, rgba(34, 211, 238, 0.34), transparent 28rem),
        radial-gradient(circle at 84% 18%, rgba(251, 113, 133, 0.34), transparent 24rem),
        radial-gradient(circle at 70% 92%, rgba(190, 242, 100, 0.18), transparent 24rem),
        linear-gradient(135deg, #1e0b4d 0%, #581c87 38%, #a21caf 72%, #312e81 100%);
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.07) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.07) 1px, transparent 1px);
      background-size: 42px 42px;
      mask-image: linear-gradient(to bottom, #000, transparent);
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .page {
      width: min(1220px, calc(100% - 32px));
      margin: 0 auto;
      padding: 28px 0 52px;
      position: relative;
    }

    .nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      padding-bottom: 36px;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-weight: 900;
    }

    .brand-badge,
    .icon-box {
      width: 42px;
      height: 42px;
      display: grid;
      place-items: center;
      border-radius: 8px;
      background: linear-gradient(135deg, var(--cyan), var(--pink));
      box-shadow: 0 14px 36px rgba(34, 211, 238, 0.24);
    }

    .nav-actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 10px;
    }

    .chip,
    .button {
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 10px 14px;
      background: rgba(255, 255, 255, 0.11);
      backdrop-filter: blur(16px);
      font-weight: 800;
    }

    .button {
      cursor: pointer;
      color: #38105e;
      background: #fff;
      border-radius: 8px;
      min-height: 44px;
    }

    .hero {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 340px;
      gap: 18px;
      align-items: stretch;
      margin-bottom: 18px;
    }

    .hero-main,
    .panel {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: var(--shadow);
      backdrop-filter: blur(22px);
    }

    .hero-main {
      min-height: 330px;
      padding: clamp(24px, 5vw, 46px);
      display: grid;
      align-content: center;
      overflow: hidden;
      position: relative;
    }

    .hero-main::after {
      content: "📊";
      position: absolute;
      right: 28px;
      bottom: 18px;
      font-size: clamp(5rem, 12vw, 9rem);
      opacity: 0.2;
      transform: rotate(-8deg);
    }

    .kicker {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0;
      font-size: clamp(2.8rem, 7vw, 6.2rem);
      line-height: 0.95;
      max-width: 860px;
      text-wrap: balance;
    }

    .hero-copy {
      max-width: 720px;
      margin: 22px 0 0;
      color: var(--muted);
      font-size: clamp(1.06rem, 2vw, 1.28rem);
      line-height: 1.8;
    }

    .status-panel {
      padding: 22px;
      display: grid;
      align-content: space-between;
      gap: 18px;
    }

    .status-light {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--lime);
      font-weight: 900;
    }

    .event-item {
      display: grid;
      grid-template-columns: 42px 1fr;
      gap: 12px;
      align-items: center;
      padding: 14px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.1);
    }

    .pulse {
      width: 12px;
      height: 12px;
      border-radius: 99px;
      background: var(--lime);
      box-shadow: 0 0 0 8px rgba(190, 242, 100, 0.12);
    }

    .updated {
      color: var(--muted);
      line-height: 1.6;
    }

    .metrics {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
      margin-bottom: 18px;
    }

    .metric {
      min-height: 150px;
      padding: 20px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.13);
      box-shadow: 0 16px 44px rgba(35, 8, 70, 0.26);
    }

    .metric-label {
      color: var(--muted);
      font-weight: 900;
    }

    .metric-value {
      margin-top: 14px;
      font-size: clamp(2.4rem, 5vw, 4.4rem);
      line-height: 1;
      font-weight: 900;
    }

    .metric-note {
      margin-top: 12px;
      color: var(--muted);
      line-height: 1.5;
    }

    .dashboard-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .panel {
      padding: 20px;
      box-shadow: 0 16px 44px rgba(35, 8, 70, 0.26);
    }

    .panel.wide {
      grid-column: 1 / -1;
    }

    .panel-heading {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 16px;
    }

    h2 {
      margin: 0;
      font-size: clamp(1.35rem, 3vw, 2.2rem);
    }

    .bar-list {
      display: grid;
      gap: 12px;
    }

    .bar-row {
      display: grid;
      gap: 8px;
    }

    .bar-top {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      font-weight: 900;
    }

    .bar-track {
      height: 14px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.12);
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      width: 0%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--cyan), var(--lime));
      transition: width 500ms ease;
    }

    .donut-wrap {
      display: grid;
      grid-template-columns: 180px 1fr;
      gap: 18px;
      align-items: center;
    }

    .donut {
      width: 180px;
      aspect-ratio: 1;
      border-radius: 50%;
      background: conic-gradient(var(--cyan) 0deg, var(--pink) 0deg);
      display: grid;
      place-items: center;
      box-shadow: inset 0 0 0 16px rgba(255, 255, 255, 0.08);
    }

    .donut::after {
      content: attr(data-total);
      width: 104px;
      aspect-ratio: 1;
      display: grid;
      place-items: center;
      border-radius: 50%;
      background: rgba(43, 12, 82, 0.92);
      font-size: 2rem;
      font-weight: 900;
    }

    .legend {
      display: grid;
      gap: 10px;
    }

    .legend-item {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 10px 12px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.08);
      font-weight: 900;
    }

    .table-wrap {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 850px;
    }

    th,
    td {
      padding: 12px 10px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.16);
      text-align: left;
      vertical-align: top;
    }

    th {
      color: #fef3c7;
      font-size: 0.9rem;
    }

    td {
      color: var(--muted);
      line-height: 1.5;
    }

    .empty,
    .error {
      padding: 24px;
      border: 1px dashed rgba(255, 255, 255, 0.3);
      border-radius: 8px;
      color: var(--muted);
      line-height: 1.8;
    }

    .error {
      color: #fecdd3;
    }

    @media (max-width: 980px) {
      .hero,
      .dashboard-grid {
        grid-template-columns: 1fr;
      }

      .metrics {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 640px) {
      .page {
        width: min(100% - 24px, 1220px);
        padding-top: 18px;
      }

      .nav {
        align-items: flex-start;
        flex-direction: column;
      }

      .metrics {
        grid-template-columns: 1fr;
      }

      .donut-wrap {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <nav class="nav" aria-label="頁面導覽">
      <a class="brand" href="index.html">
        <span class="brand-badge">🚀</span>
        <span>Training Workshop</span>
      </a>
      <div class="nav-actions">
        <a class="chip" href="index.html">回報名頁</a>
        <button class="button" type="button" id="refreshButton">重新整理 ✨</button>
      </div>
    </nav>

    <section class="hero">
      <div class="hero-main">
        <div class="kicker">
          <span class="chip">📊 即時報名現況</span>
          <span class="chip">🧠 職類分布</span>
          <span class="chip">⚡ 實體 / 線上統計</span>
        </div>
        <h1>報名現況儀表板</h1>
        <p class="hero-copy">依據 Google Sheets「工作坊報名資料」分頁即時整理，快速掌握參與人數、主持人身分、參與方式與最新報名名單。</p>
      </div>

      <aside class="panel status-panel">
        <div>
          <div class="status-light"><span class="pulse"></span><span id="connectionStatus">正在讀取資料</span></div>
          <p class="updated" id="lastUpdated">連線到 Google Apps Script 中...</p>
        </div>
        <div class="event-item">
          <div class="icon-box">🏥</div>
          <div>
            <div class="metric-label">資料來源</div>
            <div class="metric-note">Google Sheets：工作坊報名資料</div>
          </div>
        </div>
      </aside>
    </section>

    <section class="metrics" aria-label="報名摘要">
      <article class="metric">
        <div class="metric-label">總報名數</div>
        <div class="metric-value" id="totalCount">0</div>
        <div class="metric-note">目前已送出的報名筆數</div>
      </article>
      <article class="metric">
        <div class="metric-label">實體參與</div>
        <div class="metric-value" id="onsiteCount">0</div>
        <div class="metric-note">預計到場參與</div>
      </article>
      <article class="metric">
        <div class="metric-label">線上參與</div>
        <div class="metric-value" id="onlineCount">0</div>
        <div class="metric-note">預計線上參與</div>
      </article>
      <article class="metric">
        <div class="metric-label">主持人</div>
        <div class="metric-value" id="hostCount">0</div>
        <div class="metric-note">目前擔任計畫主持人</div>
      </article>
    </section>

    <section class="dashboard-grid">
      <article class="panel">
        <div class="panel-heading">
          <h2>參與方式</h2>
          <span>⚡</span>
        </div>
        <div class="donut-wrap">
          <div class="donut" id="participationDonut" data-total="0"></div>
          <div class="legend" id="participationLegend"></div>
        </div>
      </article>

      <article class="panel">
        <div class="panel-heading">
          <h2>主持人身分</h2>
          <span>🎓</span>
        </div>
        <div class="donut-wrap">
          <div class="donut" id="hostDonut" data-total="0"></div>
          <div class="legend" id="hostLegend"></div>
        </div>
      </article>

      <article class="panel">
        <div class="panel-heading">
          <h2>職類分布</h2>
          <span>🌈</span>
        </div>
        <div class="bar-list" id="professionBars"></div>
      </article>

      <article class="panel">
        <div class="panel-heading">
          <h2>機構分布</h2>
          <span>🏢</span>
        </div>
        <div class="bar-list" id="organizationBars"></div>
      </article>

      <article class="panel wide">
        <div class="panel-heading">
          <h2>最新報名資料</h2>
          <span>📝</span>
        </div>
        <div class="table-wrap" id="tableWrap"></div>
      </article>
    </section>
  </main>

  <script>
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzMI2Hyfv9gCn8m_wAibGPmmI2dFGl3qsufwZItU39CrDa2zzNSQGTkCfk7u_ybGr9K/exec";
    const COLORS = ["#22d3ee", "#fb7185", "#bef264", "#c084fc", "#fef08a", "#38bdf8"];

    const elements = {
      connectionStatus: document.querySelector("#connectionStatus"),
      lastUpdated: document.querySelector("#lastUpdated"),
      totalCount: document.querySelector("#totalCount"),
      onsiteCount: document.querySelector("#onsiteCount"),
      onlineCount: document.querySelector("#onlineCount"),
      hostCount: document.querySelector("#hostCount"),
      participationDonut: document.querySelector("#participationDonut"),
      participationLegend: document.querySelector("#participationLegend"),
      hostDonut: document.querySelector("#hostDonut"),
      hostLegend: document.querySelector("#hostLegend"),
      professionBars: document.querySelector("#professionBars"),
      organizationBars: document.querySelector("#organizationBars"),
      tableWrap: document.querySelector("#tableWrap"),
      refreshButton: document.querySelector("#refreshButton"),
    };

    function loadDashboard() {
      elements.connectionStatus.textContent = "正在讀取資料";
      elements.lastUpdated.textContent = "連線到 Google Apps Script 中...";
      const callbackName = `renderWorkshopDashboard_${Date.now()}`;
      const script = document.createElement("script");
      const separator = APPS_SCRIPT_URL.includes("?") ? "&" : "?";

      window[callbackName] = (payload) => {
        delete window[callbackName];
        script.remove();
        renderDashboard(payload);
      };

      script.onerror = () => {
        delete window[callbackName];
        script.remove();
        renderError("無法讀取 Apps Script 資料。請確認 Web App 已重新部署，且存取權限允許公開讀取。");
      };

      script.src = `${APPS_SCRIPT_URL}${separator}action=dashboard&callback=${callbackName}&t=${Date.now()}`;
      document.body.appendChild(script);
    }

    function renderDashboard(payload) {
      if (!payload || !payload.ok) {
        renderError(payload && payload.message ? payload.message : "資料格式不正確。");
        return;
      }

      const summary = payload.summary || {};
      const rows = payload.rows || [];
      const participation = summary.byParticipationType || {};
      const hostStatus = summary.byHostStatus || {};

      elements.connectionStatus.textContent = "資料已同步";
      elements.lastUpdated.textContent = `最後更新：${payload.lastUpdated || "未提供"}，共 ${summary.total || 0} 筆資料。`;
      elements.totalCount.textContent = summary.total || 0;
      elements.onsiteCount.textContent = participation["實體"] || 0;
      elements.onlineCount.textContent = participation["線上"] || 0;
      elements.hostCount.textContent = hostStatus["是"] || 0;

      renderDonut(elements.participationDonut, elements.participationLegend, participation);
      renderDonut(elements.hostDonut, elements.hostLegend, hostStatus);
      renderBars(elements.professionBars, summary.byProfession || {});
      renderBars(elements.organizationBars, summary.byOrganization || {}, 8);
      renderTable(rows);
    }

    function renderDonut(donut, legend, data) {
      const entries = Object.entries(data).filter((entry) => entry[1] > 0);
      const total = entries.reduce((sum, entry) => sum + entry[1], 0);
      donut.dataset.total = total;

      if (!total) {
        donut.style.background = "rgba(255, 255, 255, 0.12)";
        legend.innerHTML = `<div class="empty">目前尚無資料</div>`;
        return;
      }

      let cursor = 0;
      const segments = entries.map(([label, count], index) => {
        const start = cursor;
        const end = cursor + (count / total) * 360;
        cursor = end;
        return `${COLORS[index % COLORS.length]} ${start}deg ${end}deg`;
      });

      donut.style.background = `conic-gradient(${segments.join(", ")})`;
      legend.innerHTML = entries.map(([label, count], index) => `
        <div class="legend-item">
          <span><span style="color: ${COLORS[index % COLORS.length]}">●</span> ${escapeHtml(label)}</span>
          <span>${count}</span>
        </div>
      `).join("");
    }

    function renderBars(container, data, limit = 12) {
      const entries = Object.entries(data)
        .filter((entry) => entry[1] > 0)
        .sort((a, b) => b[1] - a[1])
        .slice(0, limit);
      const max = entries.reduce((value, entry) => Math.max(value, entry[1]), 0);

      if (!entries.length) {
        container.innerHTML = `<div class="empty">目前尚無資料</div>`;
        return;
      }

      container.innerHTML = entries.map(([label, count]) => {
        const width = max ? Math.max((count / max) * 100, 6) : 0;
        return `
          <div class="bar-row">
            <div class="bar-top">
              <span>${escapeHtml(label)}</span>
              <span>${count}</span>
            </div>
            <div class="bar-track">
              <div class="bar-fill" style="width: ${width}%"></div>
            </div>
          </div>
        `;
      }).join("");
    }

    function renderTable(rows) {
      if (!rows.length) {
        elements.tableWrap.innerHTML = `<div class="empty">目前尚無報名資料。資料送入 Google Sheets 後會顯示在這裡。</div>`;
        return;
      }

      elements.tableWrap.innerHTML = `
        <table>
          <thead>
            <tr>
              <th>提交時間</th>
              <th>姓名</th>
              <th>機構名</th>
              <th>職稱</th>
              <th>職類</th>
              <th>主持人</th>
              <th>參與方式</th>
              <th>Email</th>
              <th>電話</th>
            </tr>
          </thead>
          <tbody>
            ${rows.slice(0, 30).map((row) => `
              <tr>
                <td>${escapeHtml(row.submittedAt)}</td>
                <td>${escapeHtml(row.name)}</td>
                <td>${escapeHtml(row.organization)}</td>
                <td>${escapeHtml(row.jobTitle)}</td>
                <td>${escapeHtml(row.profession)}</td>
                <td>${escapeHtml(row.isHost)}</td>
                <td>${escapeHtml(row.participationType)}</td>
                <td>${escapeHtml(row.email)}</td>
                <td>${escapeHtml(row.phone)}</td>
              </tr>
            `).join("")}
          </tbody>
        </table>
      `;
    }

    function renderError(message) {
      elements.connectionStatus.textContent = "讀取失敗";
      elements.lastUpdated.textContent = message;
      elements.tableWrap.innerHTML = `<div class="error">${escapeHtml(message)}</div>`;
      elements.professionBars.innerHTML = `<div class="empty">等待資料來源更新</div>`;
      elements.organizationBars.innerHTML = `<div class="empty">等待資料來源更新</div>`;
    }

    function escapeHtml(value) {
      return String(value || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    elements.refreshButton.addEventListener("click", loadDashboard);
    loadDashboard();
  </script>
</body>
</html>
